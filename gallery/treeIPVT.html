    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wrapper = document.getElementById('video-wrapper');
            const video = document.getElementById('main-video');
            const playBtn = document.getElementById('btn-play');
            const resetBtn = document.getElementById('btn-reset');
            const fsBtn = document.getElementById('btn-fullscreen');
            const speedBtns = document.querySelectorAll('.speed-btn');
            const speedIndicator = document.getElementById('speed-indicator');
            const progressBar = document.getElementById('video-progress');

            function updatePlayIcon() {
                playBtn.innerHTML = video.paused ? '<i class="bi bi-play-fill"></i>' : '<i class="bi bi-pause-fill"></i>';
            }

            function togglePlay() {
                video.paused ? video.play() : video.pause();
                updatePlayIcon();
            }

            function setSpeed(speed) {
                const s = parseFloat(speed).toFixed(2);
                const displaySpeed = parseFloat(s); // Remove trailing zeros
                video.playbackRate = displaySpeed;

                // Update Indicator Text
                speedIndicator.innerText = displaySpeed + 'x';

                // Highlight Button if it matches exactly
                speedBtns.forEach(btn => {
                    btn.classList.toggle('active', parseFloat(btn.dataset.speed) === displaySpeed);
                });
            }

            // Button Listeners
            playBtn.addEventListener('click', togglePlay);
            resetBtn.addEventListener('click', () => {
                video.currentTime = 0;
                video.pause();
                updatePlayIcon();
            });
            fsBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) wrapper.requestFullscreen();
                else document.exitFullscreen();
            });
            speedBtns.forEach(btn => {
                btn.addEventListener('click', () => setSpeed(btn.dataset.speed));
            });

            video.addEventListener('timeupdate', () => {
                const percent = (video.currentTime / video.duration) * 100;
                progressBar.style.width = percent + '%';
            });

            // Keyboard Listeners
            window.addEventListener('keydown', (e) => {
                const isVisible = !!(video.offsetWidth || video.offsetHeight);
                if (!isVisible) return;

                if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
                    e.preventDefault();
                }

                switch(e.code) {
                    case 'Space': togglePlay(); break;
                    case 'ArrowRight': video.currentTime += 5; break;
                    case 'ArrowLeft': video.currentTime -= 5; break;
                    case 'ArrowUp': 
                        if (video.playbackRate < 2) setSpeed(video.playbackRate + 0.25); 
                        break;
                    case 'ArrowDown': 
                        if (video.playbackRate > 0.25) setSpeed(video.playbackRate - 0.25); 
                        break;
                }
            });
        });
    </script>
