    <script>
        const video = document.getElementById('myVideo');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playBtn = document.getElementById('playBtn');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const speedDisplay = document.getElementById('speedDisplay');
        
        let currentSpeed = 1.0;
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        video.addEventListener('timeupdate', function() {
            const progress = (video.currentTime / video.duration) * 100;
            progressBar.style.width = progress + "%";
            currentTimeEl.textContent = formatTime(video.currentTime);
        });
        
        video.addEventListener('loadedmetadata', function() {
            durationEl.textContent = formatTime(video.duration);
        });
        
       document.querySelector(".progress").addEventListener("click", function(e){

            const rect = this.getBoundingClientRect();

            const pos = (e.clientX - rect.left) / rect.width;

            video.currentTime = pos * video.duration;

        });
        
        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.textContent = '⏸ Pause';
            } else {
                video.pause();
                playBtn.textContent = '▶ Play';
            }
        }
        
        function setSpeed(speed) {
            currentSpeed = speed;
            video.playbackRate = speed;
            speedDisplay.textContent = speed.toFixed(2) + 'x';
            
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        function changeSpeed(delta) {
            const speeds = [0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
            let newSpeed = currentSpeed + delta;
            
            let closest = speeds.reduce((prev, curr) => {
                return Math.abs(curr - newSpeed) < Math.abs(prev - newSpeed) ? curr : prev;
            });
            
            closest = Math.max(0.25, Math.min(2.0, closest));
            setSpeed(closest);
        }
        
        volumeSlider.addEventListener('input', function() {
            video.volume = this.value;
            updateMuteButton();
        });
        
        function toggleMute() {
            video.muted = !video.muted;
            updateMuteButton();
        }
        
        function updateMuteButton() {
            if (video.muted || video.volume === 0) {
                muteBtn.textContent = '🔇';
                volumeSlider.value = 0;
            } else {
                muteBtn.textContent = '🔊';
                volumeSlider.value = video.volume;
            }
        }
        
        function toggleFullscreen() {
            const container = document.querySelector('.video-container');
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        
        document.addEventListener("keydown", function(e) {

            // Ignore shortcuts while typing in inputs/sliders
            const tag = document.activeElement.tagName;
            if (tag === "INPUT" || tag === "TEXTAREA") return;

            switch (e.key.toLowerCase()) {

                case " ":
                    e.preventDefault();
                    togglePlay();
                    break;

                case "arrowleft":
                    e.preventDefault();
                    video.currentTime = Math.max(0, video.currentTime - 5);
                    break;

                case "arrowright":
                    e.preventDefault();
                    video.currentTime = Math.min(video.duration,
                                                 video.currentTime + 5);
                    break;

                case "arrowup":
                    e.preventDefault();
                    setSpeed(Math.min(video.playbackRate + 0.25, 2));
                    break;

                case "arrowdown":
                    e.preventDefault();
                    setSpeed(Math.max(video.playbackRate - 0.25, 0.25));
                    break;

                case "m":
                    e.preventDefault();
                    toggleMute();
                    break;

                case "f":
                    e.preventDefault();
                    toggleFullscreen();
                    break;
            }

        });
        
        video.load();
        updateMuteButton();
        
        progressBar.addEventListener('keydown', function(e) {
            if (e.code === 'ArrowLeft') {
                video.currentTime = Math.max(0, video.currentTime - 5);
            } else if (e.code === 'ArrowRight') {
                video.currentTime = Math.min(video.duration, video.currentTime + 5);
            }
        });
    </script>
